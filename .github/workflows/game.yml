<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Собери ценности!</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
}
body {
    background: url('data:image/jpeg;base64,') center center / cover no-repeat;
}

/* Modal overlay */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal {
    position: relative;
    width: 90vw;
    max-width: 480px;
    height: 85vh;
    max-height: 750px;
    background: linear-gradient(135deg, #1a1a3e 0%, #2d1b69 50%, #1a1a3e 100%);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(100, 60, 255, 0.5), inset 0 0 60px rgba(100, 60, 255, 0.1);
    border: 2px solid rgba(150, 120, 255, 0.3);
    touch-action: none;
}

/* Stars background inside modal */
.modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.2), transparent);
    pointer-events: none;
    z-index: 0;
}

/* HUD */
.hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 16px;
    z-index: 10;
    pointer-events: none;
}
.hearts {
    display: flex;
    gap: 6px;
}
.heart {
    font-size: 28px;
    filter: drop-shadow(0 0 4px rgba(255,0,0,0.5));
    transition: all 0.3s;
}
.heart.lost {
    opacity: 0.2;
    transform: scale(0.8);
}

/* Score panel */
.score-panel {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
    max-width: 180px;
}
.score-item {
    display: flex;
    align-items: center;
    gap: 3px;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
    padding: 3px 8px 3px 4px;
    backdrop-filter: blur(5px);
}
.score-item img {
    width: 22px;
    height: 22px;
    object-fit: contain;
}
.score-item span {
    color: #fff;
    font-size: 13px;
    font-weight: bold;
    text-shadow: 0 0 4px rgba(0,0,0,0.5);
}

/* Game area */
.game-area {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    z-index: 5;
}

/* Falling items */
.falling-item {
    position: absolute;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    cursor: default;
    pointer-events: none;
    transition: none;
    will-change: transform;
    z-index: 5;
}
.falling-item img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    pointer-events: none;
}

/* Basket */
.basket {
    position: absolute;
    bottom: 20px;
    width: 70px;
    height: 56px;
    z-index: 8;
    transform: translateX(-50%);
    transition: none;
}
.basket-body {
    width: 100%;
    height: 100%;
    position: relative;
}
.basket-body svg {
    width: 100%;
    height: 100%;
}

/* End screens */
.end-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    padding: 30px;
    text-align: center;
}
.end-screen.active {
    display: flex;
}
.end-screen h2 {
    color: #fff;
    font-size: 26px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    line-height: 1.3;
}
.end-screen .emoji-big {
    font-size: 64px;
    margin-bottom: 20px;
}
.btn-retry {
    padding: 14px 36px;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #6c3ce0, #a855f7);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(168,85,247,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 10px;
}
.btn-retry:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 30px rgba(168,85,247,0.7);
}
.btn-retry:active {
    transform: scale(0.95);
}

/* Start screen */
.start-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    padding: 30px;
    text-align: center;
}
.start-screen h1 {
    color: #fff;
    font-size: 28px;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(168,85,247,0.5);
}
.start-screen p {
    color: rgba(255,255,255,0.8);
    font-size: 15px;
    margin-bottom: 24px;
    line-height: 1.5;
    max-width: 340px;
}
.start-screen .target-icons {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
}
.start-screen .target-icons img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    filter: drop-shadow(0 0 6px rgba(168,85,247,0.6));
}
.btn-start {
    padding: 16px 48px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #6c3ce0, #a855f7);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(168,85,247,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
}
.btn-start:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 30px rgba(168,85,247,0.7);
}

/* Catch effect */
.catch-effect {
    position: absolute;
    pointer-events: none;
    z-index: 20;
    font-size: 24px;
    font-weight: bold;
    animation: floatUp 0.8s ease-out forwards;
}
@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
}

/* Shake animation for wrong catch */
@keyframes shake {
    0%, 100% { transform: translateX(-50%); }
    20% { transform: translateX(calc(-50% - 8px)); }
    40% { transform: translateX(calc(-50% + 8px)); }
    60% { transform: translateX(calc(-50% - 6px)); }
    80% { transform: translateX(calc(-50% + 6px)); }
}
.basket.shake {
    animation: shake 0.4s ease-in-out;
}
</style>
</head>
<body>

<div class="modal-overlay">
    <div class="modal" id="gameModal">
        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <h1>🎯 Собери ценности!</h1>
            <p>Лови в корзинку только ценные предметы! Избегай бомб, динамита, какашек и конфет. У тебя 3 жизни.</p>
            <div class="target-icons">
                <img src="data:image/png;base64," alt="almaz">
                <img src="data:image/png;base64," alt="butterfly">
                <img src="data:image/png;base64," alt="medal">
                <img src="data:image/png;base64," alt="patient">
                <img src="data:image/png;base64," alt="magnet">
            </div>
            <button class="btn-start" id="btnStart">Начать игру</button>
        </div>

        <!-- HUD -->
        <div class="hud" id="hud" style="display:none;">
            <div class="hearts" id="hearts">
                <span class="heart" id="h1">❤️</span>
                <span class="heart" id="h2">❤️</span>
                <span class="heart" id="h3">❤️</span>
            </div>
            <div class="score-panel" id="scorePanel">
                <div class="score-item"><img src="data:image/png;base64," alt=""><span id="sc_almaz">0/5</span></div>
                <div class="score-item"><img src="data:image/png;base64," alt=""><span id="sc_butterfly">0/5</span></div>
                <div class="score-item"><img src="data:image/png;base64," alt=""><span id="sc_medal">0/5</span></div>
                <div class="score-item"><img src="data:image/png;base64," alt=""><span id="sc_patient">0/5</span></div>
                <div class="score-item"><img src="data:image/png;base64," alt=""><span id="sc_magnet">0/5</span></div>
            </div>
        </div>

        <!-- Game Area -->
        <div class="game-area" id="gameArea">
            <!-- Basket -->
            <div class="basket" id="basket" style="display:none;">
                <div class="basket-body">
                    <svg viewBox="0 0 70 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 8 H65 L58 52 H12 Z" fill="#8B5E3C" stroke="#5C3A1E" stroke-width="2"/>
                        <path d="M5 8 H65 V16 H5 Z" fill="#A0713C" stroke="#5C3A1E" stroke-width="2"/>
                        <line x1="20" y1="16" x2="17" y2="52" stroke="#5C3A1E" stroke-width="1.5"/>
                        <line x1="35" y1="16" x2="35" y2="52" stroke="#5C3A1E" stroke-width="1.5"/>
                        <line x1="50" y1="16" x2="53" y2="52" stroke="#5C3A1E" stroke-width="1.5"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Win Screen -->
        <div class="end-screen" id="winScreen">
            <div class="emoji-big">🎉</div>
            <h2>Ура! Ты собрал все ценности!</h2>
            <button class="btn-retry" id="btnWinRestart">Играть снова</button>
        </div>

        <!-- Lose Screen -->
        <div class="end-screen" id="loseScreen">
            <div class="emoji-big">😢</div>
            <h2>О нет! Попробуй ещё раз</h2>
            <button class="btn-retry" id="btnRetry">Попробовать ещё раз</button>
        </div>
    </div>
</div>

<script>
// Base64 images for good items
const GOOD_ITEMS = [
    { type: 'almaz', src: 'data:image/png;base64,' },
    { type: 'butterfly', src: 'data:image/png;base64,' },
    { type: 'medal', src: 'data:image/png;base64,' },
    { type: 'patient', src: 'data:image/png;base64,' },
    { type: 'magnet', src: 'data:image/png;base64,' },
];

// Bad items (emoji)
const BAD_ITEMS = [
    { type: 'bomb', emoji: '💣' },
    { type: 'poop', emoji: '💩' },
    { type: 'dynamite', emoji: '🧨' },
    { type: 'candy', emoji: '🍬' },
];

// Game state
let lives = 3;
let scores = { almaz: 0, butterfly: 0, medal: 0, patient: 0, magnet: 0 };
let gameRunning = false;
let fallingItems = [];
let spawnInterval = null;
let animFrameId = null;
let basketX = 0;
let lastTime = 0;
let gameAreaRect = null;
let difficultyTimer = 0;
let spawnRate = 1200; // ms between spawns
let fallSpeed = 1.8; // pixels per frame at 60fps

const modal = document.getElementById('gameModal');
const gameArea = document.getElementById('gameArea');
const basket = document.getElementById('basket');
const hud = document.getElementById('hud');
const startScreen = document.getElementById('startScreen');
const winScreen = document.getElementById('winScreen');
const loseScreen = document.getElementById('loseScreen');

// Preload images
GOOD_ITEMS.forEach(item => {
    const img = new Image();
    img.src = item.src;
});

function updateRect() {
    gameAreaRect = gameArea.getBoundingClientRect();
}

function resetGame() {
    lives = 3;
    scores = { almaz: 0, butterfly: 0, medal: 0, patient: 0, magnet: 0 };
    spawnRate = 1200;
    fallSpeed = 1.8;
    difficultyTimer = 0;

    // Clear items
    fallingItems.forEach(fi => fi.el.remove());
    fallingItems = [];

    // Reset UI
    document.querySelectorAll('.heart').forEach(h => h.classList.remove('lost'));
    updateScoreUI();
    winScreen.classList.remove('active');
    loseScreen.classList.remove('active');
    startScreen.style.display = 'none';
    hud.style.display = '';
    basket.style.display = '';

    // Remove effects
    document.querySelectorAll('.catch-effect').forEach(e => e.remove());
}

function updateScoreUI() {
    document.getElementById('sc_almaz').textContent = Math.min(scores.almaz, 5) + '/5';
    document.getElementById('sc_butterfly').textContent = Math.min(scores.butterfly, 5) + '/5';
    document.getElementById('sc_medal').textContent = Math.min(scores.medal, 5) + '/5';
    document.getElementById('sc_patient').textContent = Math.min(scores.patient, 5) + '/5';
    document.getElementById('sc_magnet').textContent = Math.min(scores.magnet, 5) + '/5';
}

function updateHeartsUI() {
    const hearts = [document.getElementById('h1'), document.getElementById('h2'), document.getElementById('h3')];
    for (let i = 0; i < 3; i++) {
        if (i >= lives) hearts[i].classList.add('lost');
        else hearts[i].classList.remove('lost');
    }
}

function checkWin() {
    return scores.almaz >= 5 && scores.butterfly >= 5 && scores.medal >= 5 && scores.patient >= 5 && scores.magnet >= 5;
}

function spawnItem() {
    if (!gameRunning) return;
    updateRect();

    const isGood = Math.random() < 0.55; // 55% chance of good item
    const item = isGood
        ? GOOD_ITEMS[Math.floor(Math.random() * GOOD_ITEMS.length)]
        : BAD_ITEMS[Math.floor(Math.random() * BAD_ITEMS.length)];

    const el = document.createElement('div');
    el.className = 'falling-item';

    if (isGood) {
        const img = document.createElement('img');
        img.src = item.src;
        img.draggable = false;
        el.appendChild(img);
    } else {
        el.textContent = item.emoji;
    }

    const areaW = gameAreaRect ? gameAreaRect.width : gameArea.offsetWidth;
    const x = Math.random() * (areaW - 44);
    el.style.left = x + 'px';
    el.style.top = '-50px';

    gameArea.appendChild(el);

    fallingItems.push({
        el: el,
        x: x,
        y: -50,
        type: item.type,
        isGood: isGood,
        speed: fallSpeed * (0.8 + Math.random() * 0.4),
        alive: true
    });
}

function showEffect(x, y, text, color) {
    const eff = document.createElement('div');
    eff.className = 'catch-effect';
    eff.textContent = text;
    eff.style.left = x + 'px';
    eff.style.top = y + 'px';
    eff.style.color = color;
    gameArea.appendChild(eff);
    setTimeout(() => eff.remove(), 800);
}

function gameLoop(timestamp) {
    if (!gameRunning) return;

    if (!lastTime) lastTime = timestamp;
    const delta = (timestamp - lastTime) / 16.67; // normalize to ~60fps
    lastTime = timestamp;

    // Difficulty ramp
    difficultyTimer += delta;
    if (difficultyTimer > 300) { // every ~5 seconds
        difficultyTimer = 0;
        if (spawnRate > 600) spawnRate -= 30;
        if (fallSpeed < 3.5) fallSpeed += 0.05;
    }

    updateRect();
    const areaH = gameAreaRect ? gameAreaRect.height : gameArea.offsetHeight;
    const areaW = gameAreaRect ? gameAreaRect.width : gameArea.offsetWidth;

    const basketRect = basket.getBoundingClientRect();
    const gameRect = gameArea.getBoundingClientRect();
    const bLeft = basketRect.left - gameRect.left;
    const bRight = basketRect.right - gameRect.left;
    const bTop = basketRect.top - gameRect.top;

    for (let i = fallingItems.length - 1; i >= 0; i--) {
        const fi = fallingItems[i];
        if (!fi.alive) continue;

        fi.y += fi.speed * delta;
        fi.el.style.top = fi.y + 'px';

        // Check collision with basket
        const itemCX = fi.x + 22;
        const itemBottom = fi.y + 44;

        if (itemBottom >= bTop && itemBottom <= bTop + 40 && itemCX >= bLeft && itemCX <= bRight) {
            fi.alive = false;
            fi.el.remove();

            if (fi.isGood) {
                scores[fi.type] = (scores[fi.type] || 0) + 1;
                updateScoreUI();
                showEffect(fi.x, fi.y, '+1 ✨', '#FFD700');

                if (checkWin()) {
                    endGame(true);
                    return;
                }
            } else {
                lives--;
                updateHeartsUI();
                showEffect(fi.x, fi.y, '-1 ❤️', '#FF4444');
                basket.classList.add('shake');
                setTimeout(() => basket.classList.remove('shake'), 400);

                if (lives <= 0) {
                    endGame(false);
                    return;
                }
            }

            fallingItems.splice(i, 1);
            continue;
        }

        // Remove if off screen
        if (fi.y > areaH + 50) {
            fi.alive = false;
            fi.el.remove();
            fallingItems.splice(i, 1);
        }
    }

    animFrameId = requestAnimationFrame(gameLoop);
}

function startGame() {
    resetGame();
    gameRunning = true;
    lastTime = 0;

    updateRect();
    const areaW = gameAreaRect ? gameAreaRect.width : gameArea.offsetWidth;
    basketX = areaW / 2;
    basket.style.left = basketX + 'px';

    spawnInterval = setInterval(spawnItem, spawnRate);
    // Also adjust spawn interval dynamically
    let spawnAdjuster = setInterval(() => {
        if (!gameRunning) { clearInterval(spawnAdjuster); return; }
        clearInterval(spawnInterval);
        spawnInterval = setInterval(spawnItem, spawnRate);
    }, 3000);

    animFrameId = requestAnimationFrame(gameLoop);
}

function endGame(won) {
    gameRunning = false;
    clearInterval(spawnInterval);
    cancelAnimationFrame(animFrameId);

    // Clear remaining items
    fallingItems.forEach(fi => fi.el.remove());
    fallingItems = [];

    if (won) {
        winScreen.classList.add('active');
    } else {
        loseScreen.classList.add('active');
    }
}

// Controls — Mouse
gameArea.addEventListener('mousemove', (e) => {
    if (!gameRunning) return;
    updateRect();
    const x = e.clientX - gameAreaRect.left;
    basketX = Math.max(35, Math.min(gameAreaRect.width - 35, x));
    basket.style.left = basketX + 'px';
});

// Controls — Touch
gameArea.addEventListener('touchmove', (e) => {
    if (!gameRunning) return;
    e.preventDefault();
    updateRect();
    const touch = e.touches[0];
    const x = touch.clientX - gameAreaRect.left;
    basketX = Math.max(35, Math.min(gameAreaRect.width - 35, x));
    basket.style.left = basketX + 'px';
}, { passive: false });

gameArea.addEventListener('touchstart', (e) => {
    if (!gameRunning) return;
    e.preventDefault();
    updateRect();
    const touch = e.touches[0];
    const x = touch.clientX - gameAreaRect.left;
    basketX = Math.max(35, Math.min(gameAreaRect.width - 35, x));
    basket.style.left = basketX + 'px';
}, { passive: false });

// Prevent scrolling on modal
modal.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

// Buttons
document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRetry').addEventListener('click', startGame);
document.getElementById('btnWinRestart').addEventListener('click', startGame);

// Handle resize
window.addEventListener('resize', updateRect);
</script>
</body>
</html>
